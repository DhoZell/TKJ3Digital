<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Jadwal" />
  <meta name="theme-color" content="#080810" />
  <title>Jadwal Kelas</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="notif-container"></div>

  <!-- Install Banner -->
  <div id="install-banner" style="display:none;">
    <div class="install-content">
      <span class="install-icon">📲</span>
      <div class="install-text">
        <div class="install-title">Install ke HP</div>
        <div class="install-sub">Notifikasi jalan otomatis</div>
      </div>
      <button id="install-btn" class="install-btn">Install</button>
      <button id="install-dismiss" class="install-dismiss">✕</button>
    </div>
  </div>

  <header class="topbar">
    <div class="topbar-left">
      <div class="pulse-dot"></div>
      <div>
        <div class="kelas-label">SMK XI TKJ</div>
        <div id="live-clock" class="live-clock">00:00</div>
      </div>
    </div>
    <div id="notif-bell" class="bell-btn">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span id="notif-badge" class="notif-badge" style="display:none">!</span>
    </div>
  </header>

  <section class="hero">
    <p class="hero-date" id="hero-date">Minggu, 1 Jan 2025</p>
    <h1 class="hero-day" id="hero-day">Senin</h1>
    <div class="next-class-pill" id="next-pill">
      <div class="nc-dot"></div>
      <span id="nc-text">Memuat jadwal...</span>
    </div>
  </section>

  <div class="tabs-wrap">
    <div class="tabs" id="day-tabs">
      <button class="tab-btn active" data-day="Senin">Sen</button>
      <button class="tab-btn" data-day="Selasa">Sel</button>
      <button class="tab-btn" data-day="Rabu">Rab</button>
      <button class="tab-btn" data-day="Kamis">Kam</button>
      <button class="tab-btn" data-day="Jumat">Jum</button>
      <button class="tab-btn" data-day="Sabtu">Sab</button>
    </div>
  </div>

  <div class="progress-row" id="progress-row" style="display:none;">
    <span class="prog-label">Progress hari ini</span>
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    <span class="prog-pct" id="prog-pct">0%</span>
  </div>

  <section class="sched-list" id="sched-list"></section>

  <div style="height:40px;"></div>
  <script src="script.js"></script>
</body>
</html>
